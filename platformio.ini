; Development Environment (Default)
[platformio]
default_envs = dev

; Common configuration for ESP32 environments
[esp32_common]
platform = espressif32
board = wemos_d1_mini32
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = default.csv
monitor_filters = esp32_exception_decoder

; Common build flags for ESP32
build_flags = 
    -Os
    -Iinclude
    -DCONFIG_FREERTOS_UNICORE=0
    -DCONFIG_ARDUINO_RUNNING_CORE=1
    -DCONFIG_ARDUINO_EVENT_RUNNING_CORE=1
    -DARDUINOJSON_USE_LONG_LONG=0
    -DARDUINOJSON_USE_DOUBLE=0
    -DPUBSUBCLIENT_MAX_PACKET_SIZE=512
    -DMQTT_MAX_PACKET_SIZE=512

lib_deps =
    bblanchon/ArduinoJson@^7.1.0
    knolleary/PubSubClient@^2.8
    Links2004/WebSockets@^2.4.0

; Test configuration for ESP32
test_framework = unity
test_build_src = no

[env:dev]
platform = ${esp32_common.platform}
board = ${esp32_common.board}
framework = ${esp32_common.framework}
monitor_speed = ${esp32_common.monitor_speed}
upload_speed = ${esp32_common.upload_speed}
board_build.filesystem = ${esp32_common.board_build.filesystem}
board_build.partitions = ${esp32_common.board_build.partitions}
monitor_filters = ${esp32_common.monitor_filters}
test_framework = ${esp32_common.test_framework}
test_build_src = ${esp32_common.test_build_src}
lib_deps = ${esp32_common.lib_deps}
build_flags = 
    ${esp32_common.build_flags}
    -DFIRMWARE_VERSION=\"dev\"
    -DGIT_HASH=\"unknown\"
    -DGIT_BRANCH=\"dev\"
    -DDEBUG_MODE=1

; Production Environment
[env:prod]
platform = ${esp32_common.platform}
board = ${esp32_common.board}
framework = ${esp32_common.framework}
monitor_speed = ${esp32_common.monitor_speed}
upload_speed = ${esp32_common.upload_speed}
board_build.filesystem = ${esp32_common.board_build.filesystem}
board_build.partitions = ${esp32_common.board_build.partitions}
monitor_filters = ${esp32_common.monitor_filters}
test_framework = ${esp32_common.test_framework}
test_build_src = ${esp32_common.test_build_src}
lib_deps = ${esp32_common.lib_deps}
build_flags = 
    ${esp32_common.build_flags}
    -DFIRMWARE_VERSION=\"${sysenv.FIRMWARE_VERSION}\"
    -DGIT_HASH=\"${sysenv.GIT_HASH}\"
    -DGIT_BRANCH=\"${sysenv.GIT_BRANCH}\"
    -DPRODUCTION_BUILD=1

; Test Environment (Native) - For CI/CD and local testing without hardware
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = 
    +<test/native_mocks/>
    -<src/>
build_flags = 
    -std=c++17
    -DUNIT_TEST
    -DNATIVE_BUILD
    -DARDUINO=100
    -DESP32
    -Wno-unused-parameter
    -Wno-unused-variable
    -Wno-missing-field-initializers
    -Wno-sign-compare
    -Itest/native_mocks
    -Iinclude
lib_deps =
    bblanchon/ArduinoJson@^7.1.0
lib_ignore =
    WebSockets
    PubSubClient
test_ignore = 
    test_wifi_manager
    test_mqtt_client
lib_extra_dirs = test/native_mocks
