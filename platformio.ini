[platformio]
default_envs = dev

; Common configuration for all environments
[env]
platform = espressif32
board = wemos_d1_mini32
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = default.csv
monitor_filters = esp32_exception_decoder

; Common build flags
build_flags = 
    -Os
    -Iinclude
    -DCONFIG_FREERTOS_UNICORE=0
    -DCONFIG_ARDUINO_RUNNING_CORE=1
    -DCONFIG_ARDUINO_EVENT_RUNNING_CORE=1
    -DARDUINOJSON_USE_LONG_LONG=0
    -DARDUINOJSON_USE_DOUBLE=0
    -DPUBSUBCLIENT_MAX_PACKET_SIZE=512
    -DMQTT_MAX_PACKET_SIZE=512

lib_deps =
    bblanchon/ArduinoJson@^7.1.0
    knolleary/PubSubClient@^2.8
    Links2004/WebSockets@^2.4.0

; Development Environment (Default)
[env:dev]
build_flags = 
    ${env.build_flags}
    -DFIRMWARE_VERSION=\"dev\"
    -DGIT_HASH=\"unknown\"
    -DGIT_BRANCH=\"dev\"
    -DDEBUG_MODE=1

; Production Environment with Git Integration
[env:prod]
build_flags = 
    ${env.build_flags}
    !python -c "import subprocess; print('-DFIRMWARE_VERSION=\\\"' + subprocess.getoutput('git describe --tags --always 2>/dev/null || echo v1.0.0').replace('\"', '\\\\\"') + '\\\"', end='')"
    !python -c "import subprocess; print('-DGIT_HASH=\\\"' + subprocess.getoutput('git rev-parse --short HEAD 2>/dev/null || echo unknown').replace('\"', '\\\\\"') + '\\\"', end='')"
    !python -c "import subprocess; print('-DGIT_BRANCH=\\\"' + subprocess.getoutput('git rev-parse --abbrev-ref HEAD 2>/dev/null || echo main').replace('\"', '\\\\\"') + '\\\"', end='')"
    -DPRODUCTION_BUILD=1
