; Development Environment (Default)
[platformio]
default_envs = dev

; Common configuration for all environments
[env]
platform = espressif32
board = wemos_d1_mini32
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = default.csv
monitor_filters = esp32_exception_decoder

; Common build flags
build_flags = 
    -Os
    -Iinclude
    -DCONFIG_FREERTOS_UNICORE=0
    -DCONFIG_ARDUINO_RUNNING_CORE=1
    -DCONFIG_ARDUINO_EVENT_RUNNING_CORE=1
    -DARDUINOJSON_USE_LONG_LONG=0
    -DARDUINOJSON_USE_DOUBLE=0
    -DPUBSUBCLIENT_MAX_PACKET_SIZE=512
    -DMQTT_MAX_PACKET_SIZE=512

lib_deps =
    bblanchon/ArduinoJson@^7.1.0
    knolleary/PubSubClient@^2.8
    Links2004/WebSockets@^2.4.0

; Test configuration
test_framework = unity
test_build_src = no

[env:dev]
build_flags = 
    ${env.build_flags}
    -DFIRMWARE_VERSION=\"dev\"
    -DGIT_HASH=\"unknown\"
    -DGIT_BRANCH=\"dev\"
    -DDEBUG_MODE=1

; Production Environment
[env:prod]
build_flags = 
    ${env.build_flags}
    -DFIRMWARE_VERSION=\"${sysenv.FIRMWARE_VERSION}\"
    -DGIT_HASH=\"${sysenv.GIT_HASH}\"
    -DGIT_BRANCH=\"${sysenv.GIT_BRANCH}\"
    -DPRODUCTION_BUILD=1

; Test Environment (Native)
[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags = 
    -std=c++17
    -DUNIT_TEST
    -DNATIVE_BUILD
lib_deps =
    bblanchon/ArduinoJson@^7.1.0
