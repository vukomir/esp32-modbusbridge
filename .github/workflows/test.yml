name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'README.md'
      - 'README'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'README.md'
      - 'README'

jobs:
  # Compilation tests for all test suites (verify they compile)
  test-compilation:
    name: Test Compilation Verification
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-suite:
          - test_basic
          - test_config
          - test_esplogger
          - test_modbus_client
          - test_inverter_factory
          - test_solplanet_asw
          - test_hiking_dds238
          - test_poller
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio
          .pio
        key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio
        
    - name: Install project dependencies
      run: pio pkg install
      
    - name: Compile Test - ${{ matrix.test-suite }}
      run: pio test -e dev -f ${{ matrix.test-suite }} --without-uploading --without-testing
      continue-on-error: false

  # ESP32 firmware build and test
  esp32-build:
    name: ESP32 Firmware Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio
          .pio
        key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio
        
    - name: Install project dependencies
      run: pio pkg install
      
    - name: Build ESP32 Firmware (dev)
      run: pio run -e dev
      
    - name: Build ESP32 Firmware (prod)
      run: pio run -e prod
      
    - name: Check binary size
      run: |
        echo "=== Firmware Size Analysis ==="
        echo "Development Build:"
        pio run -e dev -t size
        echo ""
        echo "Production Build:"
        pio run -e prod -t size
        
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: esp32-firmware
        path: |
          .pio/build/dev/firmware.bin
          .pio/build/prod/firmware.bin
        retention-days: 7
        
  # Code quality checks
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio
          .pio
        key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio
        
    - name: Install project dependencies
      run: pio pkg install
        
    - name: Read-only Modbus invariant check
      run: bash scripts/check_readonly.sh

    - name: Static Analysis
      run: pio check --skip-packages
      continue-on-error: true
      
    - name: Check code formatting (if clang-format config exists)
      run: |
        if [ -f ".clang-format" ]; then
          echo "Checking code formatting..."
          find src lib test -name "*.cpp" -o -name "*.h" | xargs clang-format --dry-run --Werror
        else
          echo "No .clang-format config found, skipping formatting check"
        fi
      continue-on-error: true

  # Pipeline summary and reporting
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test-compilation, esp32-build, code-quality]
    if: always()
    steps:
    - name: Pipeline Summary
      run: |
        echo "=== CI/CD Pipeline Summary ==="
        echo "Test Compilation: ${{ needs.test-compilation.result }}"
        echo "ESP32 Build: ${{ needs.esp32-build.result }}"
        echo "Code Quality: ${{ needs.code-quality.result }}"
        echo ""
        
        if [ "${{ needs.test-compilation.result }}" = "success" ] && [ "${{ needs.esp32-build.result }}" = "success" ]; then
          echo "✅ All critical jobs passed!"
          echo "🚀 Ready for deployment!"
          exit 0
        else
          echo "❌ Some critical jobs failed"
          echo "🛑 Deployment blocked"
          exit 1
        fi
