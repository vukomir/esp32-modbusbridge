name: Test Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'README.md'
      - 'README'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'README.md'
      - 'README'

jobs:
  build:
    name: Build ESP32 Firmware for Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Install project dependencies
        run: |
          pio pkg install

      - name: Build dev Environment
        run: |
          pio run -e dev

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-test
          path: .pio/build/dev/firmware.bin
          retention-days: 7 
