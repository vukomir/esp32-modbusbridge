# Complete 3-Phase Dashboard Example for Home Assistant
# For SolPlanet ASW 3-Phase Inverters
# Copy-paste this into your dashboard YAML editor

title: Solar 3-Phase Monitoring
views:
  - title: Overview
    path: overview
    icon: mdi:solar-power
    cards:
      # Real-time Power Production
      - type: gauge
        entity: sensor.solar_active_power
        name: "Total Solar Production"
        min: 0
        max: 6000  # Adjust to your inverter max power
        needle: true
        severity:
          green: 3000
          yellow: 1500
          red: 0

      # Daily and Total Production
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.solar_daily_production
            name: "Today's Production"
            icon: mdi:solar-power
          - type: entity
            entity: sensor.solar_total_production
            name: "Total Production"
            icon: mdi:counter

      # Three-Phase Voltage Balance
      - type: custom:bar-card
        title: "Phase Voltages (V)"
        entities:
          - entity: sensor.solar_l1_voltage
            name: "L1"
            color: "#FF6B6B"
          - entity: sensor.solar_l2_voltage
            name: "L2"
            color: "#4ECDC4"
          - entity: sensor.solar_l3_voltage
            name: "L3"
            color: "#95E1D3"
        min: 220
        max: 240
        target: 230
        positions:
          icon: "off"
          name: inside

      # Three-Phase Current Distribution
      - type: custom:bar-card
        title: "Phase Currents (A)"
        entities:
          - entity: sensor.solar_l1_current
            name: "L1"
            color: "#FF6B6B"
          - entity: sensor.solar_l2_current
            name: "L2"
            color: "#4ECDC4"
          - entity: sensor.solar_l3_current
            name: "L3"
            color: "#95E1D3"
        min: 0
        max: 10
        positions:
          icon: "off"
          name: inside

      # Phase Power Calculation (requires template sensors)
      - type: entities
        title: "Power per Phase"
        entities:
          - entity: sensor.solar_l1_power
            name: "L1 Power"
          - entity: sensor.solar_l2_power
            name: "L2 Power"
          - entity: sensor.solar_l3_power
            name: "L3 Power"
          - type: divider
          - entity: sensor.solar_active_power
            name: "Total Power"

      # PV Strings
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.solar_pv1_power
            name: "PV String 1"
            min: 0
            max: 2500
          - type: gauge
            entity: sensor.solar_pv2_power
            name: "PV String 2"
            min: 0
            max: 2500
          - type: gauge
            entity: sensor.solar_pv3_power
            name: "PV String 3"
            min: 0
            max: 2500

      # Power Quality
      - type: entities
        title: "Power Quality"
        entities:
          - entity: sensor.solar_grid_frequency
            name: "Grid Frequency"
          - entity: sensor.solar_power_factor
            name: "Power Factor"
          - entity: sensor.solar_apparent_power
            name: "Apparent Power"
          - entity: sensor.solar_reactive_power
            name: "Reactive Power"

  - title: 3-Phase Details
    path: threephase
    icon: mdi:sine-wave
    cards:
      # Detailed Phase Voltages
      - type: entities
        title: "Phase-to-Neutral Voltages"
        show_header_toggle: false
        entities:
          - entity: sensor.solar_l1_voltage
            name: "L1-N Voltage"
            icon: mdi:sine-wave
          - entity: sensor.solar_l2_voltage
            name: "L2-N Voltage"
            icon: mdi:sine-wave
          - entity: sensor.solar_l3_voltage
            name: "L3-N Voltage"
            icon: mdi:sine-wave
          - type: divider
          - entity: sensor.solar_voltage_imbalance
            name: "Voltage Imbalance %"

      # Line-to-Line Voltages
      - type: entities
        title: "Line-to-Line Voltages"
        show_header_toggle: false
        entities:
          - entity: sensor.solar_rs_line_voltage
            name: "R-S (L1-L2)"
            icon: mdi:cosine-wave
          - entity: sensor.solar_rt_line_voltage
            name: "R-T (L1-L3)"
            icon: mdi:cosine-wave
          - entity: sensor.solar_st_line_voltage
            name: "S-T (L2-L3)"
            icon: mdi:cosine-wave

      # Phase Currents
      - type: entities
        title: "Phase Currents"
        show_header_toggle: false
        entities:
          - entity: sensor.solar_l1_current
            name: "L1 Current"
            icon: mdi:current-ac
          - entity: sensor.solar_l2_current
            name: "L2 Current"
            icon: mdi:current-ac
          - entity: sensor.solar_l3_current
            name: "L3 Current"
            icon: mdi:current-ac
          - type: divider
          - entity: sensor.solar_current_imbalance
            name: "Current Imbalance %"

      # Phase Balance Visualization
      - type: custom:apexcharts-card
        header:
          title: "3-Phase Voltage Balance"
          show: true
        series:
          - entity: sensor.solar_l1_voltage
            name: "L1"
            color: "#FF6B6B"
          - entity: sensor.solar_l2_voltage
            name: "L2"
            color: "#4ECDC4"
          - entity: sensor.solar_l3_voltage
            name: "L3"
            color: "#95E1D3"
        span:
          start: hour
        graph_span: 6h

      - type: custom:apexcharts-card
        header:
          title: "3-Phase Current Distribution"
          show: true
        series:
          - entity: sensor.solar_l1_current
            name: "L1"
            color: "#FF6B6B"
          - entity: sensor.solar_l2_current
            name: "L2"
            color: "#4ECDC4"
          - entity: sensor.solar_l3_current
            name: "L3"
            color: "#95E1D3"
        span:
          start: hour
        graph_span: 6h

  - title: Battery
    path: battery
    icon: mdi:battery-charging
    cards:
      - type: gauge
        entity: sensor.battery_soc
        name: "Battery State of Charge"
        min: 0
        max: 100
        needle: true
        severity:
          green: 50
          yellow: 20
          red: 0

      - type: entities
        title: "Battery Status"
        entities:
          - entity: sensor.battery_power
            name: "Power"
          - entity: sensor.battery_voltage
            name: "Voltage"
          - entity: sensor.battery_current
            name: "Current"
          - entity: sensor.battery_temperature
            name: "Temperature"
          - entity: sensor.battery_soh
            name: "State of Health"

  - title: System
    path: system
    icon: mdi:information-outline
    cards:
      - type: entities
        title: "Inverter Status"
        entities:
          - entity: sensor.solar_inverter_state
            name: "State"
          - entity: binary_sensor.solar_inverter_online
            name: "Online"
          - entity: sensor.solar_internal_temperature
            name: "Internal Temp"
          - entity: sensor.solar_boost_temperature
            name: "Boost Temp"
          - entity: sensor.solar_total_hours
            name: "Operating Hours"

      - type: entities
        title: "Diagnostics"
        entities:
          - entity: sensor.solar_error_code
            name: "Error Code"
          - entity: sensor.solar_error_message
            name: "Error Message"
          - entity: sensor.solar_warning_code
            name: "Warning Code"
          - entity: sensor.solar_bus_voltage
            name: "DC Bus Voltage"
