# =============================================================================
# SolPlanet Inverter — diagnostics package
# Per-string PV, per-phase grid AC, per-phase EPS, line-to-line voltages,
# temperatures, bus voltage, runtime/grid-config metadata.
# These are NOT inputs to the HA Energy Dashboard. Split from the primary
# package so dashboards stay focused on energy.
# Same device block as solplanet_inverter.yaml (uses same identifiers).
# =============================================================================

mqtt:
  sensor:
    # -------------------------------------------------------------------------
    # PV STRINGS — per-string voltage, current, power
    # -------------------------------------------------------------------------
    - name: "PV1 Voltage"
      unique_id: sp_pv1_voltage
      state_topic: "home/inverter/telemetry/pv1_voltage"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      availability: &avail
        - topic: "home/inverter/status/availability"
          payload_available: "online"
          payload_not_available: "offline"
      device: &dev
        identifiers: [esp32_solplanet_bridge]
        name: "SolPlanet Inverter"
        model: "ASW (GEN/HYBRID)"
        manufacturer: "SolPlanet"
        configuration_url: "http://modbusbridge.local"

    - name: "PV1 Current"
      unique_id: sp_pv1_current
      state_topic: "home/inverter/telemetry/pv1_current"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      availability: *avail
      device: *dev

    - name: "PV1 Power"
      unique_id: sp_pv1_power
      state_topic: "home/inverter/telemetry/pv1_power"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      availability: *avail
      device: *dev

    - name: "PV2 Voltage"
      unique_id: sp_pv2_voltage
