# =============================================================================
# SolPlanet Inverter — diagnostics package (SINGLE-PHASE variant)
#
# Use this file ONLY if your inverter is a single-phase ASW model
# (firmware register 31001 reports ASCII '1'). For three-phase inverters
# use solplanet_diagnostics.yaml instead — they are mutually exclusive,
# do NOT install both.
#
# Diff vs. the three-phase version:
#   - L2 / L3 voltage and current entities removed
#   - RS / RT / ST line-to-line voltages removed (only meaningful in 3-phase)
#   - Grid L2 / L3 power and reactive power removed
#   - EPS L2 / L3 voltage / current / active / reactive removed
#
# What stays:
#   - PV string monitoring (PV1/PV2/PV3) — single-phase inverters can still
#     have multiple PV strings. If your model has only one string, PV2/PV3
#     entities will show 0 W and you can hide them in HA.
#   - L1 voltage and current (the only AC phase on a 1ph inverter)
#   - Grid L1 power / reactive
#   - EPS L1 voltage / current / active / reactive
#   - Bus voltage, temperatures, battery diagnostics, runtime / grid metadata
# =============================================================================

mqtt:
  sensor:
    # -------------------------------------------------------------------------
    # PV STRINGS — per-string voltage, current, power
    # -------------------------------------------------------------------------
    - name: "PV1 Voltage"
      unique_id: sp_pv1_voltage
      state_topic: "home/inverter/telemetry/pv1_voltage"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      availability: &avail
        - topic: "home/inverter/status/availability"
          payload_available: "online"
          payload_not_available: "offline"
      device: &dev
        identifiers: [esp32_solplanet_bridge]
        name: "SolPlanet Inverter"
        model: "ASW (single-phase)"
        manufacturer: "SolPlanet"
        configuration_url: "http://modbusbridge.local"

    - name: "PV1 Current"
      unique_id: sp_pv1_current
      state_topic: "home/inverter/telemetry/pv1_current"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      availability: *avail
      device: *dev

    - name: "PV1 Power"
      unique_id: sp_pv1_power
      state_topic: "home/inverter/telemetry/pv1_power"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      availability: *avail
      device: *dev

    - name: "PV2 Voltage"
