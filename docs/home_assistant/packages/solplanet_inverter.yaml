# =============================================================================
# SolPlanet Inverter — primary MQTT package
# Source of truth: topics published by the ESP32 Modbus-MQTT bridge under
# `home/inverter/...`. Topic list verified against live MQTT capture; only
# topics that actually appear in the device's MQTT output are wired here.
#
# Conventions:
#   - JSON payloads use {"value":N,"unit":"X","timestamp":N,"device_id":"..."}
#     value_template extracts `value_json.value`.
#   - Raw scalar topics omit value_template (HA uses the raw payload).
#   - Daily-resetting kWh sensors use state_class: total + last_reset_value_template
#     so the HA Energy Dashboard handles midnight rollover correctly.
#   - Cumulative-life kWh sensors use state_class: total_increasing.
#   - Entity_ids are derived by HA from `<device_name>_<entity_name>` slug.
#     With device.name = "SolPlanet Inverter" the entity_ids look like
#     sensor.solplanet_inverter_<entity_name_slug>. Templates in
#     solplanet_templates.yaml reference that pattern. If your HA produces
#     different ids (some versions don't prefix the device name), look up the
#     actual ids under Settings → Devices → SolPlanet Inverter and update
#     templates accordingly.
# =============================================================================

mqtt:
  sensor:
    # -------------------------------------------------------------------------
    # ENERGY — direct HA Energy Dashboard inputs (cumulative)
    # -------------------------------------------------------------------------
    - name: "Solar Energy Total"
      unique_id: sp_solar_energy_total
      state_topic: "home/inverter/telemetry/energy_total"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability:
        - topic: "home/inverter/status/availability"
          payload_available: "online"
          payload_not_available: "offline"
      device: &dev
        identifiers: [esp32_solplanet_bridge]
        name: "SolPlanet Inverter"
        model: "ASW (GEN/HYBRID)"
        manufacturer: "SolPlanet"
        configuration_url: "http://modbusbridge.local"

    - name: "Grid Export Total"
      unique_id: sp_grid_export_total
      state_topic: "home/inverter/telemetry/grid_export_total"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability: &avail
        - topic: "home/inverter/status/availability"
          payload_available: "online"
          payload_not_available: "offline"
      device: *dev

    - name: "PV Energy Total"
      unique_id: sp_pv_energy_total
      state_topic: "home/inverter/telemetry/pv_energy_total"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability: *avail
      device: *dev

    - name: "EPS Consumption Total"
      unique_id: sp_eps_consumption_total
      state_topic: "home/inverter/telemetry/eps_consumption_total"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability: *avail
      device: *dev

    # -------------------------------------------------------------------------
    # ENERGY — daily counters with last_reset (HA Energy Dashboard compatible)
    # IMPORTANT: assumes inverter resets these at local midnight.
    # If your inverter resets on a different boundary, HA Energy will misreport.
    # -------------------------------------------------------------------------
    - name: "Solar Energy Today"
      unique_id: sp_solar_energy_today
      state_topic: "home/inverter/telemetry/energy_today"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      last_reset_value_template: "{{ today_at('00:00').isoformat() }}"
      availability: *avail
      device: *dev

    - name: "PV Energy Today"
      unique_id: sp_pv_energy_today
      state_topic: "home/inverter/telemetry/pv_energy_today"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      last_reset_value_template: "{{ today_at('00:00').isoformat() }}"
      availability: *avail
      device: *dev

    - name: "Grid Consumption Today"
      unique_id: sp_grid_consumption_today
      state_topic: "home/inverter/telemetry/consumption_today"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      last_reset_value_template: "{{ today_at('00:00').isoformat() }}"
      availability: *avail
      device: *dev

    - name: "Grid Export Today"
      unique_id: sp_grid_export_today
      state_topic: "home/inverter/telemetry/grid_export_today"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      last_reset_value_template: "{{ today_at('00:00').isoformat() }}"
      availability: *avail
      device: *dev

    - name: "AC Generation Today"
      unique_id: sp_generation_today_ac
      state_topic: "home/inverter/telemetry/generation_today_ac"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      last_reset_value_template: "{{ today_at('00:00').isoformat() }}"
      availability: *avail
      device: *dev

    - name: "Battery Charge Today"
      unique_id: sp_battery_charge_today
      state_topic: "home/inverter/telemetry/battery_charge_today"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      last_reset_value_template: "{{ today_at('00:00').isoformat() }}"
      availability: *avail
      device: *dev

    - name: "Battery Discharge Today"
      unique_id: sp_battery_discharge_today
      state_topic: "home/inverter/telemetry/battery_discharge_today"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      last_reset_value_template: "{{ today_at('00:00').isoformat() }}"
      availability: *avail
      device: *dev

    - name: "EPS Consumption Today"
      unique_id: sp_eps_consumption_today
      state_topic: "home/inverter/telemetry/eps_consumption_today"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      last_reset_value_template: "{{ today_at('00:00').isoformat() }}"
      availability: *avail
      device: *dev

    - name: "Generator Energy Today"
      unique_id: sp_generator_energy_today
      state_topic: "home/inverter/telemetry/generator_energy_today"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      last_reset_value_template: "{{ today_at('00:00').isoformat() }}"
      availability: *avail
      device: *dev

    # -------------------------------------------------------------------------
    # POWER — instantaneous AC output, PV total, battery, EPS aggregate
    # -------------------------------------------------------------------------
    - name: "AC Active Power"
      unique_id: sp_ac_active_power
      state_topic: "home/inverter/telemetry/active_power"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      availability: *avail
      device: *dev

    - name: "AC Apparent Power"
      unique_id: sp_ac_apparent_power
      state_topic: "home/inverter/telemetry/apparent_power"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "VA"
      device_class: apparent_power
      state_class: measurement
      availability: *avail
      device: *dev

    - name: "AC Reactive Power"
      unique_id: sp_ac_reactive_power
      state_topic: "home/inverter/telemetry/reactive_power"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "var"
      device_class: reactive_power
      state_class: measurement
      availability: *avail
