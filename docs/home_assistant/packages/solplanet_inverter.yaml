    # -------------------------------------------------------------------------
    # STATUS / FAULTS
    # -------------------------------------------------------------------------
    - name: "State"
      unique_id: sp_inverter_state
      state_topic: "home/inverter/telemetry/device_state_text"
      availability: *avail
      device: *dev

    - name: "Error Code"
      unique_id: sp_inverter_error_code
      state_topic: "home/inverter/telemetry/error_code"
