    - name: "EPS Voltage"
      unique_id: sp_eps_voltage
      state_topic: "home/inverter/telemetry/eps_voltage"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      availability: *avail
      device: *dev

    - name: "EPS Current"
      unique_id: sp_eps_current
      state_topic: "home/inverter/telemetry/eps_current"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "A"
      device_class: current
