      state_topic: "home/inverter/telemetry/grid_connection"
      availability: *avail
      device: *dev

  # ---------------------------------------------------------------------------
  # BINARY SENSORS
  # ---------------------------------------------------------------------------
  binary_sensor:
    - name: "Online"
      unique_id: sp_inverter_online
      state_topic: "home/inverter/status/availability"
      payload_on: "online"
      payload_off: "offline"
      device_class: connectivity
      device: *dev

    - name: "Fault"
      unique_id: sp_inverter_fault
      state_topic: "home/inverter/telemetry/device_state_text"
      payload_on: "Fault"
      payload_off: "Normal"
      device_class: problem
      availability: *avail
      device: *dev

    - name: "Grid Connected"
      unique_id: sp_grid_connected
      state_topic: "home/inverter/telemetry/grid_connection"
      payload_on: "Connected"
      payload_off: "Disconnected"
      device_class: connectivity
      availability: *avail
      device: *dev

    - name: "MAX485 Connected"
      unique_id: sp_max485_connected
      state_topic: "home/inverter/hardware/max485_status"
      value_template: "{{ value_json.status }}"
      payload_on: "connected"
      payload_off: "disconnected"
      device_class: connectivity
      device: *dev
