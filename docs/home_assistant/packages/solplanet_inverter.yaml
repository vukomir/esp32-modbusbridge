    - name: "EPS Active Power"
      unique_id: sp_eps_active_power
      state_topic: "home/inverter/telemetry/eps_active_power"
      value_template: "{{ value_json.value }}"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      availability: *avail
