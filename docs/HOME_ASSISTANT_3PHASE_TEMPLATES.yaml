# Template Sensors for 3-Phase Calculations
# Add these to your configuration.yaml under 'template:'

template:
  - sensor:
      # ========================================
      # POWER PER PHASE (V × A)
      # ========================================

      - name: "Solar L1 Power"
        unique_id: solar_l1_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set voltage = states('sensor.solar_l1_voltage') | float(0) %}
          {% set current = states('sensor.solar_l1_current') | float(0) %}
          {{ (voltage * current) | round(0) }}

      - name: "Solar L2 Power"
        unique_id: solar_l2_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set voltage = states('sensor.solar_l2_voltage') | float(0) %}
          {% set current = states('sensor.solar_l2_current') | float(0) %}
          {{ (voltage * current) | round(0) }}

      - name: "Solar L3 Power"
        unique_id: solar_l3_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set voltage = states('sensor.solar_l3_voltage') | float(0) %}
          {% set current = states('sensor.solar_l3_current') | float(0) %}
          {{ (voltage * current) | round(0) }}

      # ========================================
      # PHASE IMBALANCE CALCULATIONS
      # ========================================

      - name: "Solar Voltage Imbalance"
        unique_id: solar_voltage_imbalance
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set l1 = states('sensor.solar_l1_voltage') | float(0) %}
          {% set l2 = states('sensor.solar_l2_voltage') | float(0) %}
          {% set l3 = states('sensor.solar_l3_voltage') | float(0) %}
          {% set avg = (l1 + l2 + l3) / 3 %}
          {% if avg > 0 %}
            {% set max_dev = [
              ((l1 - avg) | abs),
              ((l2 - avg) | abs),
              ((l3 - avg) | abs)
            ] | max %}
            {{ ((max_dev / avg) * 100) | round(2) }}
          {% else %}
            0
          {% endif %}

      - name: "Solar Current Imbalance"
        unique_id: solar_current_imbalance
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set l1 = states('sensor.solar_l1_current') | float(0) %}
          {% set l2 = states('sensor.solar_l2_current') | float(0) %}
          {% set l3 = states('sensor.solar_l3_current') | float(0) %}
          {% set avg = (l1 + l2 + l3) / 3 %}
          {% if avg > 0 %}
            {% set max_dev = [
              ((l1 - avg) | abs),
              ((l2 - avg) | abs),
              ((l3 - avg) | abs)
            ] | max %}
            {{ ((max_dev / avg) * 100) | round(2) }}
          {% else %}
            0
          {% endif %}

      # ========================================
      # AVERAGE PHASE VOLTAGE
      # ========================================

      - name: "Solar Average Phase Voltage"
        unique_id: solar_avg_phase_voltage
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        state: >
          {% set l1 = states('sensor.solar_l1_voltage') | float(0) %}
          {% set l2 = states('sensor.solar_l2_voltage') | float(0) %}
          {% set l3 = states('sensor.solar_l3_voltage') | float(0) %}
          {{ ((l1 + l2 + l3) / 3) | round(1) }}

      # ========================================
      # TOTAL PHASE CURRENT
      # ========================================

      - name: "Solar Total Phase Current"
        unique_id: solar_total_phase_current
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        state: >
          {% set l1 = states('sensor.solar_l1_current') | float(0) %}
          {% set l2 = states('sensor.solar_l2_current') | float(0) %}
          {% set l3 = states('sensor.solar_l3_current') | float(0) %}
          {{ (l1 + l2 + l3) | round(2) }}

  # ========================================
  # BINARY SENSORS - ALERTS
  # ========================================

  - binary_sensor:
      # Voltage Imbalance Warning (>2% is concerning for 3-phase)
      - name: "Solar Voltage Imbalance Warning"
        unique_id: solar_voltage_imbalance_warning
        device_class: problem
        state: >
          {{ states('sensor.solar_voltage_imbalance') | float(0) > 2.0 }}

      # Current Imbalance Warning (>10% is concerning)
      - name: "Solar Current Imbalance Warning"
        unique_id: solar_current_imbalance_warning
        device_class: problem
        state: >
          {{ states('sensor.solar_current_imbalance') | float(0) > 10.0 }}

      # Phase Voltage Out of Range (220-240V is normal)
      - name: "Solar Phase Voltage Out of Range"
        unique_id: solar_phase_voltage_oor
        device_class: problem
        state: >
          {% set l1 = states('sensor.solar_l1_voltage') | float(230) %}
          {% set l2 = states('sensor.solar_l2_voltage') | float(230) %}
          {% set l3 = states('sensor.solar_l3_voltage') | float(230) %}
          {{ l1 < 220 or l1 > 240 or
             l2 < 220 or l2 > 240 or
             l3 < 220 or l3 > 240 }}
